<!DOCTYPE html>
<html>
    <head>
    <title>Library</title>
        <style>
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            font-size: 16px;
            color: #333;
            background-color: powderblue;
        }
        
        
        main {
            padding: 20px;
        }
        h1, h2 {
            color: #333;
        }
        section {
            margin-bottom: 20px;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            background-color: #3290f6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        button:hover {
            background-color: #2a00e4;
        }
         * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .background {
      position: relative;
      width: 100%;
      height: 100%;
      background-image: url(loc_background.jpg);
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 1;
    }

    .greeting {
      font-size: 12px;
      color: #ADD8E6;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .name {
      font-size: 38px;
      font-weight: bold;
      color: white;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .divider {
      width: 50px;
      height: 2px;
      background-color: lightblue;
      margin: 0 auto 14px auto;
    }

    .tagline {
      font-size: 13px;
      color: #bbbbbb;
      letter-spacing: 1px;
    }
        </style>
    </head>
    <body>

        <div class="background">
    <div class="overlay"></div>
    <div class="container">
      <p class="greeting">Welcome To</p>
      <h1 class="name">Library2U</h1>
      <div class="divider"></div>
      <p class="tagline">Your Exploration Begin Here</p>
    </div>
  </div>
        
    </main>

</html>
